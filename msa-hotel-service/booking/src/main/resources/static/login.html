<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 — GRAND STAY</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <main class="site-main">
    <div class="container auth-layout">
      <div class="page-head text-center">
        <h1>로그인</h1>
        <p class="subtitle">GRAND STAY에 오신 것을 환영합니다</p>
      </div>

      <div class="card">
        <form class="card-body" id="login-form" novalidate>
          <div class="form-alert hidden" id="login-alert"></div>

          <div class="field">
            <label for="email">이메일</label>
            <input class="input" type="email" id="email" autocomplete="email"
                   placeholder="you@example.com" required>
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input class="input" type="password" id="password" autocomplete="current-password"
                   placeholder="비밀번호" required>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="login-btn">로그인</button>

          <p class="text-sm text-center text-muted">
            아직 회원이 아니신가요? <a href="/signup.html" class="text-gold fw-bold">회원가입</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
