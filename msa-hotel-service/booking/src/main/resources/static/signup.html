<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원가입 — GRAND STAY</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <main class="site-main">
    <div class="container auth-layout">
      <div class="page-head text-center">
        <h1>회원가입</h1>
        <p class="subtitle">몇 가지 정보만 입력하면 바로 예약할 수 있습니다</p>
      </div>

      <div class="card">
        <form class="card-body" id="signup-form" novalidate>
          <div class="form-alert hidden" id="signup-alert"></div>

          <div class="field">
            <label for="username">아이디</label>
            <input class="input" type="text" id="username" autocomplete="username" placeholder="영문/숫자 4자 이상" required>
            <div class="field-error" data-for="username"></div>
          </div>

          <div class="field">
            <label for="name">이름</label>
            <input class="input" type="text" id="name" autocomplete="name" placeholder="홍길동" required>
            <div class="field-error" data-for="name"></div>
          </div>

          <div class="field">
            <label for="phone">휴대폰 번호</label>
            <input class="input" type="tel" id="phone" autocomplete="tel" placeholder="010-1234-5678" required>
            <div class="field-error" data-for="phone"></div>
          </div>

          <div class="field">
            <label for="email">이메일</label>
            <input class="input" type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
            <div class="field-error" data-for="email"></div>
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input class="input" type="password" id="password" autocomplete="new-password" placeholder="8자 이상" required>
            <div class="field-error" data-for="password"></div>
          </div>

          <div class="field">
            <label for="password2">비밀번호 확인</label>
            <input class="input" type="password" id="password2" autocomplete="new-password" placeholder="비밀번호 재입력" required>
            <div class="field-error" data-for="password2"></div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="signup-btn">가입하기</button>

          <p class="text-sm text-center text-muted">
            이미 계정이 있으신가요? <a href="/login.html" class="text-gold fw-bold">로그인</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/pages/signup.js"></script>
</body>
</html>
