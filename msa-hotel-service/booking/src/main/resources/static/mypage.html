<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>마이페이지 — GRAND STAY</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <main class="site-main">
    <div class="container" style="max-width:820px">
      <!-- 프로필 헤더 (프로필 API 미구현 → 로그인 정보 + JWT role 표시) -->
      <div class="card mb-6">
        <div class="card-body flex items-center gap-4">
          <div class="thumb-placeholder" style="width:56px;height:56px;border-radius:50%;font-size:22px" id="profile-avatar"></div>
          <div>
            <h2 id="profile-email"></h2>
            <p class="text-sm text-muted" id="profile-role"></p>
          </div>
        </div>
      </div>

      <!-- 탭 -->
      <div class="tabs mb-6" id="mypage-tabs">
        <button class="tab active" data-tab="coupons">내 쿠폰</button>
        <button class="tab" data-tab="reviews">내 리뷰</button>
      </div>

      <!-- 쿠폰 탭 -->
      <section id="tab-coupons">
        <!-- 발급 가능 쿠폰 목록 API가 없어 쿠폰 번호 직접 입력 방식으로 발급한다 -->
        <div class="card mb-6">
          <div class="card-body">
            <h3 class="mb-2">쿠폰 등록</h3>
            <p class="text-sm text-muted mb-3">이벤트로 받은 쿠폰 번호를 입력하면 내 쿠폰함에 발급됩니다.</p>
            <form class="flex gap-3" id="issue-form">
              <input class="input flex-1" type="number" id="coupon-id-input" placeholder="쿠폰 번호 입력" min="1">
              <button type="submit" class="btn btn-primary" id="issue-btn">발급받기</button>
            </form>
          </div>
        </div>
        <div class="flex flex-col gap-3" id="coupon-list"></div>
      </section>

      <!-- 리뷰 탭 -->
      <section id="tab-reviews" class="hidden">
        <div class="flex flex-col gap-4" id="review-list"></div>
      </section>
    </div>
  </main>

  <!-- 리뷰 수정 모달 -->
  <div class="modal-backdrop" id="edit-review-modal">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3>리뷰 수정</h3>
        <button class="modal-close" data-close-modal>&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>평점</label>
          <div class="star-input" id="edit-star-input">
            <button type="button" data-v="1">★</button>
            <button type="button" data-v="2">★</button>
            <button type="button" data-v="3">★</button>
            <button type="button" data-v="4">★</button>
            <button type="button" data-v="5">★</button>
          </div>
        </div>
        <div class="field">
          <label for="edit-review-content">후기 내용</label>
          <textarea class="input" id="edit-review-content"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close-modal>닫기</button>
        <button class="btn btn-primary" id="edit-review-submit">수정하기</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/pages/mypage.js"></script>
</body>
</html>
