<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>쿠폰 관리 — GRAND STAY Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <main class="site-main">
    <div class="container">
      <div class="admin-layout">
        <aside class="admin-side" id="admin-side"></aside>

        <div>
          <div class="page-head">
            <h1>쿠폰 관리</h1>
            <p class="subtitle">할인 쿠폰을 생성합니다. 생성된 쿠폰 번호를 사용자에게 전달하면 마이페이지에서 발급받을 수 있습니다.</p>
          </div>

          <div class="card mb-6" style="max-width:640px">
            <form class="card-body flex flex-col gap-4" id="coupon-form">
              <div class="flex gap-4 flex-wrap">
                <div class="field flex-1">
                  <label for="c-code">쿠폰 코드 *</label>
                  <input class="input" type="text" id="c-code" required placeholder="SUMMER2026">
                </div>
                <div class="field flex-1">
                  <label for="c-name">쿠폰명 *</label>
                  <input class="input" type="text" id="c-name" required placeholder="여름 특가 쿠폰">
                </div>
              </div>
              <div class="flex gap-4 flex-wrap">
                <div class="field flex-1">
                  <label for="c-discountType">할인 방식 *</label>
                  <select class="input" id="c-discountType">
                    <option value="FIXED">정액 할인 (원)</option>
                    <option value="PERCENT">정률 할인 (%)</option>
                  </select>
                </div>
                <div class="field flex-1">
                  <label for="c-discountValue">할인 값 * <span class="text-muted" id="c-unit">(원)</span></label>
                  <input class="input" type="number" id="c-discountValue" required min="1" placeholder="10000">
                </div>
              </div>
              <div class="flex gap-4 flex-wrap">
                <div class="field flex-1">
                  <label for="c-minPrice">최소 주문 금액(원) *</label>
                  <input class="input" type="number" id="c-minPrice" required min="0" value="0">
                </div>
                <div class="field flex-1 hidden" id="c-maxDiscount-wrap">
                  <label for="c-maxDiscount">최대 할인 금액(원)</label>
                  <input class="input" type="number" id="c-maxDiscount" min="0" placeholder="제한 없음">
                </div>
                <div class="field flex-1">
                  <label for="c-issueLimit">발급 수량 제한</label>
                  <input class="input" type="number" id="c-issueLimit" min="1" placeholder="제한 없음">
                </div>
              </div>
              <div class="flex gap-4 flex-wrap">
                <div class="field flex-1">
                  <label for="c-validFrom">유효기간 시작 *</label>
                  <input class="input" type="date" id="c-validFrom" required>
                </div>
                <div class="field flex-1">
                  <label for="c-validUntil">유효기간 종료 *</label>
                  <input class="input" type="date" id="c-validUntil" required>
                </div>
              </div>
              <button type="submit" class="btn btn-primary btn-lg" id="coupon-btn">쿠폰 생성</button>
            </form>
          </div>

          <!-- 쿠폰 목록 API가 없어 생성 이력을 localStorage로 보관 -->
          <div class="page-head flex items-center justify-between">
            <h2>생성 이력 <span class="text-sm text-muted">(이 브라우저에서 생성한 쿠폰)</span></h2>
            <button class="btn btn-ghost btn-sm" id="clear-history-btn">이력 지우기</button>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>쿠폰 번호</th><th>코드</th><th>쿠폰명</th><th>할인</th>
                  <th>발급 제한</th><th>유효기간</th><th></th>
                </tr>
              </thead>
              <tbody id="history-tbody"></tbody>
            </table>
          </div>
          <div id="history-empty"></div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/pages/admin/coupons.js"></script>
</body>
</html>
