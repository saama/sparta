<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>재고 등록 — GRAND STAY Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <main class="site-main">
    <div class="container">
      <div class="admin-layout">
        <aside class="admin-side" id="admin-side"></aside>

        <div>
          <div class="page-head">
            <h1>재고 등록</h1>
            <p class="subtitle">객실별로 판매 기간과 일자별 재고 수량을 등록합니다</p>
          </div>

          <div class="card mb-6" style="max-width:560px">
            <form class="card-body flex flex-col gap-4" id="stock-form">
              <div class="field">
                <label for="s-room">객실 선택 *</label>
                <select class="input" id="s-room" required>
                  <option value="">객실을 선택하세요</option>
                </select>
              </div>
              <div class="flex gap-4 flex-wrap">
                <div class="field flex-1">
                  <label for="s-start">시작일 *</label>
                  <input class="input" type="date" id="s-start" required>
                </div>
                <div class="field flex-1">
                  <label for="s-end">종료일 *</label>
                  <input class="input" type="date" id="s-end" required>
                </div>
              </div>
              <div class="field">
                <label for="s-stock">일자별 재고 수량 *</label>
                <input class="input" type="number" id="s-stock" required min="0" placeholder="10">
                <span class="hint">기간 내 각 날짜에 동일한 수량이 등록됩니다</span>
              </div>
              <button type="submit" class="btn btn-primary btn-lg" id="stock-btn">재고 등록</button>
            </form>
          </div>

          <!-- 등록 결과 확인: 해당 기간 조회로 잔여 재고 반영 확인 -->
          <div class="card hidden" id="verify-panel" style="max-width:560px">
            <div class="card-body">
              <h3 class="mb-3">등록 결과 확인</h3>
              <div id="verify-body"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/pages/admin/stock.js"></script>
</body>
</html>
